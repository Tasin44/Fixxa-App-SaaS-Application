

<!DOCTYPE html>
<html>
<head>
    <title>Quote Accepted</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            text-align: center;
            padding-top: 100px;
        }
        .card {
            background: white;
            width: 500px;
            margin: auto;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0px 5px 20px rgba(0,0,0,0.1);
        }
        h1 {
            color: #28a745;
        }
        p {
            font-size: 18px;
            color: #555;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>✅ Thank You!</h1>
        <p>You have successfully accepted the quote.</p>
        <p><strong>Quote Number:</strong> {{ quote.quote_number }}</p>
        <p>Total Amount: £{{ quote.total }}</p>
    </div>

</body>
</html>
