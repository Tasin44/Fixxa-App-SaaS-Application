version: '3.8'

services:
  # Redis Cache & Message Broker
  redis:
    image: redis:7-alpine
    container_name: fixaa_redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Django Web Server
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fixaa_web
    command: /app/entrypoint.sh
    ports:
      - "0.0.0.0:8000:8000"
    volumes:
      - .:/app
    environment:
      - DEBUG=True
      - ALLOWED_HOSTS=["*"]
      - REDIS_URL=redis://redis:6379/1
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Celery Worker
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fixaa_celery_worker
    command: celery -A myproject worker -l info
    volumes:
      - .:/app
    environment:
      - DEBUG=True
      - ALLOWED_HOSTS=["*"]
      - REDIS_URL=redis://redis:6379/1
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - redis
      - web
    restart: unless-stopped

  # Celery Beat (Scheduler)
  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fixaa_celery_beat
    command: celery -A myproject beat -l info
    volumes:
      - .:/app
    environment:
      - DEBUG=True
      - ALLOWED_HOSTS=["*"]
      - REDIS_URL=redis://redis:6379/1
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - redis
      - web
    restart: unless-stopped

volumes:
  redis_data:
